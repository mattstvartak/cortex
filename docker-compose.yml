# docker compose recipe for Cortex (Personal / VPS deployment).
#
# One service (default): the cortex MCP + API server. The dashboard
# UI moved to pyre-web (2026-05-14); for hosted use, pyre-web's
# per-tenant proxy talks to /api/* here. For self-hosted, point any
# MCP-aware client (Claude Code, Claude Desktop) at the MCP port and
# use the cortex CLI for setup.
#
# Quick start:
#   cp .env.example .env       # set OPENROUTER_API_KEY for LLM
#                              # enrichment (optional; not required for
#                              # ingest + kb_search to work)
#   docker compose up -d
#
# Remote VPS: put this behind Tailscale or a reverse proxy with TLS +
# bearer auth. The exposed ports below publish on all interfaces; for
# a real VPS add a firewall.
#
# Workspaces + engram/persona data live under the CORTEX_HOME_HOST
# directory bind-mounted below. Default is ./.cortex-data in the
# repo; set CORTEX_HOME_HOST in .env to reuse an existing workspace.
#
# Optional profiles:
#   docker compose --profile pgvector up
#       # adds Postgres + pgvector. Note: pgvector backend currently
#       # requires an enabled LLM provider for embeddings, so set
#       # OPENROUTER_API_KEY (or another provider) and flip the
#       # provider's enabled flag in cortex.yaml. Engram backend
#       # works standalone without one.
#
#   docker compose --profile ollama up
#       # adds a local Ollama daemon. Only useful if the host has a
#       # GPU; on a VPS use OpenRouter instead.

services:
  cortex:
    image: cortex:local
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      - NODE_ENV=production
      - CORTEX_MCP_TRANSPORT=http
      - CORTEX_MCP_HOST=0.0.0.0
      - CORTEX_MCP_PORT=${CORTEX_MCP_PORT:-3100}
      - CORTEX_API_HOST=0.0.0.0
      - CORTEX_API_PORT=${CORTEX_API_PORT:-4141}
      - CORTEX_WORKSPACE=${CORTEX_WORKSPACE:-}
      # Redirect engram + persona data dirs under the bind-mounted
      # /root/.cortex so their LanceDB + soul files survive restarts.
      # (Default for both is ~/.claude/<name>, which isn't mounted.)
      - ENGRAM_DATA_DIR=/root/.cortex/engram-data
      - PERSONA_DATA_DIR=/root/.cortex/persona-data
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # LLM provider hosts. host.docker.internal works on Docker Desktop
      # (Mac/Windows); on Linux it requires extra_hosts (see below).
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - POSTGRES_URL=${POSTGRES_URL:-}
    env_file:
      - .env
    extra_hosts:
      # Lets Linux hosts reach the host gateway the same way
      # Docker Desktop does on Mac/Windows. Harmless elsewhere.
      - "host.docker.internal:host-gateway"
    volumes:
      - ${CORTEX_HOME_HOST:-./.cortex-data}:/root/.cortex
      # Private modules (optional) — each is its own sibling repo,
      # mounted read-only so the running server can import compiled
      # dist/ files. Uncomment + add a line per module; point
      # cortex.yaml's `privateModules` list at the mounted paths.
      # Example:
      #   - ../cortex-private-myorg:/root/cortex-private-myorg:ro
      # Obsidian vault — set OBSIDIAN_VAULT_HOST in .env to your vault
      # path to enable the obsidian adapter. When unset, the mount
      # falls back to the cortex data dir as a safe no-op so docker
      # compose doesn't error. Inside the container, set the obsidian
      # adapter's vaultPath to /root/obsidian-vault.
      - ${OBSIDIAN_VAULT_HOST:-./.cortex-data}:/root/obsidian-vault
    ports:
      # Publish on all interfaces so both IPv4 and IPv6 localhost work
      # (Docker Desktop on Windows forwards 127.0.0.1-only binds to IPv4
      # only, which breaks browsers that resolve `localhost` to ::1).
      # For VPS deployments put Tailscale or a reverse proxy in front —
      # these ports should NOT be publicly reachable without auth.
      - "${CORTEX_MCP_PORT:-3100}:3100"
      - "${CORTEX_API_PORT:-4141}:4141"
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg17
    profiles: ["pgvector", "all"]
    environment:
      - POSTGRES_USER=cortex
      - POSTGRES_PASSWORD=cortex
      - POSTGRES_DB=cortex
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PGVECTOR_PORT:-5432}:5432"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama", "all"]
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    # GPU passthrough on a Linux host with nvidia-container-toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

volumes:
  pgvector-data:
  ollama-models:
