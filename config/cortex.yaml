# Written by `cortex init`. Re-run the wizard to regenerate.

llm:
  providers:
    ollama:
      package: "@cortex/provider-ollama"
      enabled: true
      config:
        host: "${OLLAMA_HOST}"
        defaultModel: "qwen3:14b"

  tasks:
    default:    { provider: ollama, model: "qwen3:14b" }
    structural: { provider: ollama, model: "qwen3:14b" }
    synthesis:  { provider: ollama, model: "qwen3:14b" }
    brief:      { provider: ollama, model: "qwen3:14b" }
    classify:   { provider: ollama, model: "qwen3:14b" }

  fallbackChain: []

adapters:
  confluence:
    package: "@cortex/adapter-confluence"
    enabled: false
    schedule: "0 */6 * * *"
    config:
      workspace: "yourcompany"     # <subdomain>.atlassian.net
      spaces: []                   # space keys, e.g. [ENG, PRODUCT]
      pageSize: 50
      spaceToProject: {}           # e.g. { ENG: engineering }

  jira:
    package: "@cortex/adapter-jira"
    enabled: false
    schedule: "0 */3 * * *"
    config:
      workspace: "yourcompany"     # same subdomain as Confluence
      projects: []                 # Jira project keys, e.g. [ENG, ROAD]
      jql: ""                      # optional extra filter
      pageSize: 50
      maxIssuesPerRun: 0
      projectToCortex: {}          # e.g. { ENG: engineering }

  linear:
    package: "@cortex/adapter-linear"
    enabled: false
    schedule: "0 */3 * * *"
    config:
      teams: []                    # Linear team keys, e.g. [ENG, DESIGN]
      pageSize: 50
      maxIssuesPerRun: 0
      teamToProject: {}            # e.g. { ENG: engineering }
      defaultProject: ""

  loom:
    package: "@cortex/adapter-loom"
    enabled: false
    schedule: "*/15 * * * *"
    config:
      workspace: "yourcompany"     # Loom workspace slug
      folders: []                  # scope to folder ids, empty = all
      pageSize: 50
      maxRecordingsPerRun: 0
      folderToProject: {}          # e.g. { fld_abc: engineering }
      defaultProject: ""
      skipWithoutTranscript: true

  notion:
    package: "@cortex/adapter-notion"
    enabled: false
    schedule: "0 */6 * * *"
    config:
      databases: []                # database ids to sync
      pages: []                    # standalone page ids to include
      pageSize: 50
      maxPagesPerRun: 0
      databaseToProject: {}        # e.g. { abc123def: engineering }
      defaultProject: ""

  obsidian:
    package: "@cortex/adapter-obsidian"
    enabled: false
    config:
      # vaultPath only resolves when this block is enabled; commented
      # blocks are skipped by expandEnv regardless.
      vaultPath: "${OBSIDIAN_VAULT_PATH}"
      pathToProject: []            # [{ prefix: "work/alpha/", project: project-alpha }]
      ignore: [".obsidian", ".trash", ".git", "node_modules"]
      defaultProject: ""
      maxFileBytes: 1048576

  google-calendar:
    package: "@cortex/adapter-google-calendar"
    enabled: false
    schedule: "*/30 * * * *"
    config:
      calendars: ["primary"]
      lookAheadDays: 14
      lookBackDays: 1
      pageSize: 250
      calendarToProject: {}
      defaultProject: ""

  google-drive:
    package: "@cortex/adapter-google-drive"
    enabled: false
    schedule: "0 */6 * * *"
    config:
      folderIds: []
      mimeTypes: ["application/vnd.google-apps.document"]
      pageSize: 100
      maxFilesPerRun: 0
      folderToProject: {}
      defaultProject: ""

  gmail:
    package: "@cortex/adapter-gmail"
    enabled: false
    schedule: "0 */2 * * *"
    config:
      query: "label:inbox newer_than:30d"
      maxThreadsPerRun: 50
      labelToProject: {}
      defaultProject: ""

  bitbucket:
    package: "@cortex/adapter-bitbucket"
    enabled: false
    schedule: "0 3 * * *"
    config:
      workspace: "yourcompany"
      repos: []
      branch: "main"
      includeGlobs: ["**/*.ts", "**/*.py", "**/*.go", "**/README*"]
      excludeGlobs: ["**/node_modules/**", "**/dist/**"]
      maxFilesPerRun: 0
      repoToProject: {}
      defaultProject: ""

  github:
    package: "@cortex/adapter-github"
    enabled: false
    schedule: "0 4 * * *"
    config:
      repos: []                    # owner/repo identifiers
      branch: ""                   # empty = default branch per repo
      includeGlobs: ["**/*.ts", "**/*.py", "**/*.go", "**/README*"]
      excludeGlobs: ["**/node_modules/**", "**/dist/**"]
      maxFilesPerRun: 0
      repoToProject: {}
      defaultProject: ""

  slack:
    package: "@cortex/adapter-slack"
    enabled: false
    schedule: "0 */2 * * *"
    config:
      workspace: "yourcompany"     # for URL building, e.g. yourcompany.slack.com
      channels: []                 # channel ids; bot must be a member
      historyDays: 7
      maxThreadsPerRun: 100
      channelToProject: {}
      defaultProject: ""
