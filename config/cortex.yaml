# Committed template — do not put real secrets here. `cortex init`
# regenerates a user-specific copy at ~/.cortex/workspaces/<slug>/config/
# which is what your deployment actually reads.
#
# Default provider is OpenRouter (one API key covers many models, no local
# GPU needed). Flip in `cortex init` to use Ollama instead for local-only
# inference on a GPU box.

llm:
  providers:
    openrouter:
      package: "@onenomad/cortex-provider-openrouter"
      enabled: true
      config:
        appTitle: "Cortex"

  tasks:
    default:    { provider: openrouter, model: "anthropic/claude-haiku-4.5" }
    structural: { provider: openrouter, model: "anthropic/claude-haiku-4.5" }
    synthesis:  { provider: openrouter, model: "anthropic/claude-haiku-4.5" }
    brief:      { provider: openrouter, model: "anthropic/claude-haiku-4.5" }
    classify:   { provider: openrouter, model: "anthropic/claude-haiku-4.5" }

  fallbackChain: []

memory:
  primary: engram
  # fallback: pgvector     # uncomment to enable the native Postgres fallback
  # pgvector:
  #   connectionString: "${POSTGRES_URL}"
  #   embeddingDim: 768    # must match the embed model's dimension

adapters: {}
