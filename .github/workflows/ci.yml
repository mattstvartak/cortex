name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is resolved from package.json's `packageManager` field
      # (currently pnpm@9.12.0). Specifying `with: version` here on top of
      # that errors with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (unit)
        run: pnpm test

      - name: Identifier scan
        # Belt-and-suspenders alongside the local pre-commit hook — catches
        # commits that bypassed it with --no-verify. See docs/PRIVACY.md.
        run: git ls-files | xargs bash scripts/identifier-scan.sh
